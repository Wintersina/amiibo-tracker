services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ""  # Override the entrypoint to not run gunicorn
    command: pytest tracker/tests/ tests/ -v --tb=short
    environment:
      - DJANGO_SETTINGS_MODULE=amiibo_tracker.settings.testing
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source code for development
      - ./tracker:/app/tracker
      - ./amiibo_tracker:/app/amiibo_tracker
      - ./tests:/app/tests
    working_dir: /app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=amiibo_tracker.settings
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./tracker:/app/tracker
      - ./amiibo_tracker:/app/amiibo_tracker
    working_dir: /app

  # Development server (Django runserver instead of gunicorn)
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ""
    command: python manage.py runserver 0.0.0.0:8080
    env_file:
      - path: .env
        required: false
    environment:
      - DJANGO_SETTINGS_MODULE=amiibo_tracker.settings
      - PORT=8080
      - OAUTH_REDIRECT_URI=http://localhost:8080/oauth2callback/
      - GOOGLE_OAUTH_CLIENT_SECRETS=/app/client_secret.json
    ports:
      - "8080:8080"
    volumes:
      - ./tracker:/app/tracker
      - ./amiibo_tracker:/app/amiibo_tracker
      - ./client_secret.json:/app/client_secret.json:ro
    working_dir: /app
