name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - ouath_flow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: "${{ secrets.GCP_PROJECT_ID }}"
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          export_default_credentials: true

      # --- Critical Debugging Step (Keep this!) ---
      - name: Verify Gcloud Authentication (Debugging)
        run: |
          echo "--- Gcloud active account ---"
          gcloud auth list
          echo "--- Gcloud configuration ---"
          gcloud config list
          echo "--- End Gcloud Debugging Info ---"
      # --- End Debugging Step ---

      - name: Direct Docker Login to Artifact Registry
        run: |
          # The 'sudo' might not be strictly necessary on GitHub Actions runners,
          # but is often included for Docker commands. Try without it first if issues.
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev

      - name: Build and Push Docker Image to Artifact Registry
        run: |
          IMAGE=us-central1-docker.pkg.dev/amiibo-tracker-458804/amiibo-tracker
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=us-central1-docker.pkg.dev/amiibo-tracker-458804/amiibo-tracker
          gcloud run deploy amiibo-tracker \
            --image $IMAGE \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated